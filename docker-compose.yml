version: '3.8'

services:
  # The Setup/Admin container
  bitwarden-setup:
    image: bitwarden/setup:latest
    container_name: bitwarden-setup
    user: "1001:1001" # Replace with the actual UID/GID of your bitwarden user
    volumes:
      - /opt/bitwarden/bwdata:/etc/bitwarden
    env_file:
      - ./bwdata/env/global.override.env

  # Example service (Identity)
  identity:
    image: bitwarden/identity:latest
    container_name: bitwarden-identity
    restart: always
    user: "1001:1001"
    volumes:
      - /opt/bitwarden/bwdata/identity:/etc/bitwarden/identity
    env_file:
      - /opt/bitwarden/bwdata/env/global.override.env
